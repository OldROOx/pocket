name: pocket
description: "Pocket - Caja de herramientas tecnológica para tu smartphone."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado y navegación
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Persistencia
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Hardware / sensores
  nfc_manager: 3.5.1
  flutter_blue_plus: ^1.32.12
  wifi_scan: ^0.4.1
  network_info_plus: ^5.0.3
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.1
  sensors_plus: ^5.0.1
  permission_handler: ^11.3.1

  # QR
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilidades
  uuid: ^4.4.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0

flutter:
  uses-material-design: true
